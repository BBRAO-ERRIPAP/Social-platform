{% extends 'base.html' %}
{% block title %}Followers — SocialHub{% endblock %}
{% block content %}
<h5 class="mb-3">Followers of @{{ profile_user.username }}</h5>
<div class="row g-3">
  {% for f in followers %}
  <div class="col-md-4">
    <div class="card shadow-sm p-3 d-flex flex-row align-items-center gap-3">
      <div class="rounded-circle bg-secondary text-white d-flex align-items-center justify-content-center"
           style="width:40px;height:40px">
        {{ f.follower.username|first|upper }}
      </div>
      <a href="{% url 'profile' f.follower.username %}"
         class="text-decoration-none text-dark fw-semibold">{{ f.follower.username }}</a>
    </div>
  </div>
  {% empty %}
  <p class="text-muted">No followers yet.</p>
  {% endfor %}
</div>
{% endblock %}
